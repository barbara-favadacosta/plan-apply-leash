plan_id: 2026-05-22-bump-structured-logger
description: >
  Bump the @acme/logger dependency from v1 → v2 in foo-service and update
  bar-cli's consumer to match the new interface. Open one PR per repo.

scope:
  repos:
    foo-service:
      github: acme/foo-service
      branch: feature/bump-logger-v2
      pr_title: "Bump @acme/logger to v2"
      pr_body: |
        Migrates to the v2 API per the deprecation notice. Tests pass locally.
      file_paths:
        - package.json
        - src/logger.ts
        - src/handler.ts
        - test/logger.test.ts
    bar-cli:
      github: acme/bar-cli
      branch: feature/match-new-logger
      pr_title: "Match @acme/logger v2 interface"
      pr_body: |
        Updates the logger consumer in cmd/main.go to use the new v2 method signature.
      file_paths:
        - go.mod
        - go.sum
        - cmd/main.go
        - internal/logging/setup.go

  # Build/test commands only. The git lifecycle — create each repo's `branch`,
  # stage, commit, and (after you approve) push to that branch and open the PR —
  # is built into the harness and runs for every plan, so it is NOT listed here.
  allowed_command_prefixes:
    - npm install
    - npm test
    - npm run build
    - go mod tidy
    - go test ./...
    - go build ./...

steps:
  - id: 1
    repo: foo-service
    type: file_edit
    description: Bump @acme/logger to ^2.0.0 in package.json
    path: package.json
  - id: 2
    repo: foo-service
    type: file_edit
    description: Update src/logger.ts to use v2 createLogger() signature
    path: src/logger.ts
  - id: 3
    repo: foo-service
    type: file_edit
    description: Adjust handler.ts call sites
    path: src/handler.ts
  - id: 4
    repo: foo-service
    type: file_edit
    description: Update logger tests for new interface
    path: test/logger.test.ts
  - id: 5
    repo: foo-service
    type: command
    description: Install new dependency version
    command_prefix: npm install
  - id: 6
    repo: foo-service
    type: command
    description: Run the test suite
    command_prefix: npm test

  # No git steps here: the apply env creates branch feature/bump-logger-v2,
  # commits, and (once you approve) pushes and opens the PR for this repo on its
  # own — that lifecycle is built into the harness for every plan.

  - id: 7
    repo: bar-cli
    type: file_edit
    description: Bump @acme/logger version in go.mod
    path: go.mod
  - id: 8
    repo: bar-cli
    type: file_edit
    description: Refresh go.sum
    path: go.sum
  - id: 9
    repo: bar-cli
    type: file_edit
    description: Update logger setup helper
    path: internal/logging/setup.go
  - id: 10
    repo: bar-cli
    type: file_edit
    description: Adjust cmd/main.go call site
    path: cmd/main.go
  - id: 11
    repo: bar-cli
    type: command
    description: Tidy and test
    command_prefix: go mod tidy
  - id: 12
    repo: bar-cli
    type: command
    description: Run tests
    command_prefix: go test ./...
