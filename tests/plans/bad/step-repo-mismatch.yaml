plan_id: 2026-05-22-bad-step-repo
description: A step references a repo slug that isn't declared in scope.repos.
scope:
  repos:
    foo-service:
      github: acme/foo-service
      branch: feature/test
      pr_title: "Test change"
      file_paths:
        - src/handler.ts
  allowed_command_prefixes:
    - npm test
steps:
  - id: 1
    repo: bar-cli
    type: file_edit
    description: Edit a file in a repo not in scope
    path: cmd/main.go
